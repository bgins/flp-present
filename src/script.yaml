# FLP — narration script
#
# Each scene is a self-contained world snapshot paired with a
# passage from the paper. Advancing scenes drives both the essay
# column (the quote) and the canvas (the network + buffer + trace
# state) in lockstep.
#
# Schema per scene
# ----------------
#   id        : short slug, used by the app for routing / anchors
#   head      : { section, topic }       displayed above the quote
#   cite      : citation string          shown below the quote
#   quote     : the paper passage        block scalar — keep verbatim
#                                        from analysis.md when from
#                                        the paper. Mark non-paper
#                                        sources in `note.body`.
#   note      : { marker, body }         optional presenter aside
#
#   chrome    : { stage, valency, faulty } chrome bar state
#   processes : [{ id, x, y, pos, faulty? }]
#   buffer    : [{ id, from, to, payload }]   multiset, no FIFO
#   null_steps: [process_ids]            (p, ∅) options surfaced in
#                                        the buffer panel
#   trace     : [{ stage, verb, target }] verbs: deliver | delay | step
#
# Conventions
# -----------
# - Process positions: p1 (200, 180), p2 (600, 180), p3 (400, 500).
#   Match sketch5.html's coordinates so the demo and the sketch
#   stay visually identical.
# - `b` is the blank output register value (paper §2 verbatim).
# - `∅` is our rendering of the paper's null marker (paper uses
#   the numeral 0 for it; we use ∅ to avoid confusion with the
#   decision value 0). See analysis.md L72-75.
# - `quote` is verbatim from the paper unless `note.body` cites
#   another source (Robinson, Aspnes, synth, etc.).

scenes:

  # ──────────────────────────────────────────────────────────────
  # SCENE 1 — the result, stated cold.
  # Canvas: initial config, nothing in flight, nobody faulty yet.
  # ──────────────────────────────────────────────────────────────
  - id: result
    visual: system
    head: { section: "§ 1", topic: "the result" }
    cite: "paper §1"
    quote: |
      In this paper, we show the surprising result that no completely
      asynchronous consensus protocol can tolerate even a single
      unannounced process death.

    chrome: { stage: 0, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    buffer: []
    null_steps: [p1, p2, p3]
    trace: []

  # ──────────────────────────────────────────────────────────────
  # SCENE 2 — slow vs. dead indistinguishability.
  # Bespoke `slow-vs-dead` visual: two parallel networks (p₃ slow vs.
  # p₃ dead) with a byte-identical p₁ observation box. The standard
  # 3-process snapshot below still feeds the chrome bar.
  # ──────────────────────────────────────────────────────────────
  - id: slow_vs_dead
    head: { section: "§ 1", topic: "slow vs. dead" }
    cite: "paper §1"
    quote: |
      we do not postulate the ability to detect the death of
      a process, so it is impossible for one process to tell
      whether another has died (stopped entirely) or is just
      running very slowly.

    visual: slow-vs-dead
    chrome: { stage: 0, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    buffer: []
    null_steps: [p1, p2, p3]
    trace: []

  # ──────────────────────────────────────────────────────────────
  # SCENE 3 — process registers.
  # Canvas shows x and y for every process. Quote spells out what
  # those registers mean.
  # ──────────────────────────────────────────────────────────────
  - id: process
    visual: process-state
    head: { section: "§ 2", topic: "the process" }
    cite: "paper §2"
    quote: |
      Each process p has a one-bit input register x_p, an output
      register y_p with values in {b, 0, 1}.
    note:
      marker: "▸"
      body: |
        x_p holds the value p proposes, set before the run. y_p
        holds p's decision. The decision starts blank (`b`) until p
        writes 0 or 1, and can only be written once. The `b → 0/1`
        flip is the decision this paper shows can be deferred
        forever.

    chrome: { stage: 0, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    buffer: []
    null_steps: [p1, p2, p3]
    trace: []

  # ──────────────────────────────────────────────────────────────
  # SCENE 4 — configuration, defined.
  # Anchors the term that the rest of the talk leans on heavily.
  # Same stage-0 snapshot as scene 1; nothing else has changed.
  # ──────────────────────────────────────────────────────────────
  - id: configuration
    visual: buffer-state
    head: { section: "§ 2", topic: "configuration" }
    cite: "paper §2"
    quote: |
      A configuration of the system consists of the internal
      state of each process, together with the contents of the
      message buffer. An initial configuration is one in which
      each process starts at an initial state and the message
      buffer is empty.
    note:
      marker: "▸"
      body: |
        A configuration is 0-valent, 1-valent, or bivalent. Lemma 2
        will show that some initial configuration is bivalent. Our
        badge in the header will track valency for the rest of this
        talk.

    chrome: { stage: 0, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    buffer: []
    null_steps: [p1, p2, p3]
    trace: []

  # ──────────────────────────────────────────────────────────────
  # SCENE 5 — the buffer is a multiset.
  # First scene with in-flight messages. SEND view: messages stream
  # from their SENDER into the one pool (no partitions on send). The
  # scheduler interleaves turns p₁ → p₂ → p₁ (a live run), and the
  # adversary withholds delivery, so the sends pile up:
  #   • p₁ (vote 0) — scheduled TWICE, re-broadcasts → FOUR pending
  #     (m1, m2 then a retry m5, m6): the annoying retrier. Its
  #     inflow runs the full fade crisp → lighter → faint → spent ring,
  #     ordered by recency: the retry (m5, m6) is crisp at the rim and
  #     the first broadcast (m1, m2) has sunk deepest into the core.
  #   • p₂ (vote 1) — broadcast once → two pending (m3, m4): polite.
  #   • p₃ (vote 0) — not yet scheduled → silent (foreshadows it as
  #     the process that goes faulty).
  # Both values stay in flight → bivalent. Each broadcast step sends
  # to BOTH peers (paper §2: a step sends a finite SET).
  # ──────────────────────────────────────────────────────────────
  - id: buffer
    visual: message-buffer
    head: { section: "§ 2", topic: "the buffer" }
    cite: "paper §2"
    quote: |
      The message system maintains a multiset, called the message
      buffer, of messages that have been sent but not yet
      delivered.
    note:
      marker: "▸"
      body: |
        Processes communicate by sending each other messages. A
        message is a pair (p, m), where p is the name of the
        destination process and m is a "message value".

    chrome: { stage: 3, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    buffer:
      - { id: m1, from: p1, to: p2, payload: "vote 0" }
      - { id: m2, from: p1, to: p3, payload: "vote 0" }
      - { id: m3, from: p2, to: p1, payload: "vote 1" }
      - { id: m4, from: p2, to: p3, payload: "vote 1" }
      - { id: m5, from: p1, to: p2, payload: "vote 0" }
      - { id: m6, from: p1, to: p3, payload: "vote 0" }
    null_steps: [p1, p2, p3]
    trace:
      - { stage: 1, verb: step, target: "(p1, ∅)" }   # p1 broadcasts m1, m2
      - { stage: 2, verb: step, target: "(p2, ∅)" }   # p2 broadcasts m3, m4
      - { stage: 3, verb: step, target: "(p1, ∅)" }   # p1 retries → m5, m6

  # ──────────────────────────────────────────────────────────────
  # SCENE 5 — the ∅ event.
  # The move the adversary can ALWAYS make. Trace shows a step
  # entry where receive returned ∅.
  # ──────────────────────────────────────────────────────────────
  - id: null_event
    visual: message-receive
    head: { section: "§ 2", topic: "the ∅ event" }
    cite: "paper §2"
    quote: |
      the message system is allowed to return ∅ a finite number of
      times in response to receive(p), even though a message (p, m)
      is present in the buffer.
    note:
      marker: "▸"
      body: |
        receive(p) either delivers one message or returns ∅. The
        (p, ∅) event models silence, a step where nothing is
        received. The message system acts nondeterministically, but
        a process that keeps receiving eventually gets every message
        sent to it.

    chrome: { stage: 4, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    # RECEIVE view: the same pool, now resolved into per-recipient
    # partitions. p₃'s inbox is the fullest — m2, m6 (p₁'s votes ·0)
    # and m4 (p₂'s vote ·1), both values pending — yet receive(p₃)
    # returns ∅. The system may withhold; silence isn't an empty buffer.
    buffer:
      - { id: m1, from: p1, to: p2, payload: "vote 0" }
      - { id: m2, from: p1, to: p3, payload: "vote 0" }
      - { id: m3, from: p2, to: p1, payload: "vote 1" }
      - { id: m4, from: p2, to: p3, payload: "vote 1" }
      - { id: m5, from: p1, to: p2, payload: "vote 0" }
      - { id: m6, from: p1, to: p3, payload: "vote 0" }
    null_steps: [p1, p2, p3]
    trace:
      - { stage: 1, verb: step, target: "(p1, ∅)" }   # p1 broadcasts m1, m2
      - { stage: 2, verb: step, target: "(p2, ∅)" }   # p2 broadcasts m3, m4
      - { stage: 3, verb: step, target: "(p1, ∅)" }   # p1 retries → m5, m6
      - { stage: 4, verb: step, target: "(p3, ∅)" }   # p3 reaches in — gets ∅

  # ──────────────────────────────────────────────────────────────
  # SCENE 6 — admissibility (the often-misquoted condition).
  # p3 is now faulty — dashed circle on the canvas. (p3, ∅) is
  # greyed in the buffer panel.
  # ──────────────────────────────────────────────────────────────
  - id: admissible
    head: { section: "§ 2", topic: "admissibility" }
    cite: "paper §2"
    quote: |
      A run is admissible provided that at most one process is
      faulty and that all messages sent to nonfaulty processes
      are eventually received.
    note:
      marker: "▸"
      body: |
        TWO clauses. "Admissible = at most one crash" forgets the
        message-delivery half. The proof needs both: the adversary
        gets one crash for free, but every message to nonfaulty
        processes must eventually be delivered.

    visual: message-receive
    chrome: { stage: 7, valency: bivalent, faulty: p3 }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500], faulty: true }
    # RECEIVE view (delivery): p1 (nonfaulty) finally gets m3 — the very vote
    # it has been holding since the buffer scene (admissibility: messages to
    # nonfaulty ARE received). m2, m4, m6 sit STUCK at the now-faulty p3
    # (greyed/exempt, never delivered); m5 is still pending for p2. m1 was
    # delivered to p2 earlier. Both values in flight → bivalent.
    buffer:
      - { id: m2, from: p1, to: p3, payload: "vote 0" }
      - { id: m3, from: p2, to: p1, payload: "vote 1" }
      - { id: m4, from: p2, to: p3, payload: "vote 1" }
      - { id: m5, from: p1, to: p2, payload: "vote 0" }
      - { id: m6, from: p1, to: p3, payload: "vote 0" }
    null_steps: [p1, p2, p3]
    trace:
      - { stage: 3, verb: step,    target: "(p1, ∅)" }   # p1's retry → m5, m6
      - { stage: 4, verb: step,    target: "(p3, ∅)" }   # p3's last step — then faulty
      - { stage: 5, verb: deliver, target: "m1" }         # p2 (nonfaulty) receives p1's vote
      - { stage: 6, verb: delay,   target: "m3" }         # adversary defers m3
      - { stage: 7, verb: deliver, target: "m3" }         # p1 (nonfaulty) finally receives p2's vote

  # ──────────────────────────────────────────────────────────────
  # SCENE — partial correctness (the safety goalposts).
  # Agreement + non-triviality, both SAFETY — neither requires a
  # decision, so we show the OPEN config (bivalent, y=b): non-triviality
  # is "both values still reachable," agreement is "never two at once."
  # The goalposts rail replaces buffer/trace (the off-timeline cue) and
  # the chrome drops stage and faulty. The buffer shows as faint
  # background pods. total then flips this to a decided 1-valent config.
  # ──────────────────────────────────────────────────────────────
  - id: partial
    visual: correctness
    head: { section: "§ 2", topic: "partial correctness" }
    cite: "paper §2"
    quote: |
      A consensus protocol is partially correct if it satisfies two
      conditions: (1) No accessible configuration has more than one
      decision value. (2) For each v ∈ {0, 1}, some accessible
      configuration has decision value v.
    note:
      marker: "▸"
      body: |
        Both conditions are safety. Agreement keeps the system from
        ever deciding two different values. Non-triviality keeps it
        honest, since a protocol hardwired to always answer 0 would
        satisfy agreement but be useless, so both 0 and 1 must stay
        reachable. Neither one requires the protocol to ever actually
        decide.

    chrome: { stage: null, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    buffer:
      - { id: m1, from: p1, to: p2, payload: "vote 0" }
      - { id: m2, from: p1, to: p3, payload: "vote 0" }
      - { id: m3, from: p2, to: p1, payload: "vote 1" }
      - { id: m4, from: p2, to: p3, payload: "vote 1" }
    null_steps: []
    trace: []

  # ──────────────────────────────────────────────────────────────
  # SCENE — total correctness (termination — the bar Theorem 1 breaks).
  # Adds termination: a decision must actually be reached, so the config
  # flips DECIDED (y=1, badge 1-valent). The open→decided beat from
  # partial visually enacts termination. Off-timeline chrome; the buffer
  # shows as faint background pods.
  # ──────────────────────────────────────────────────────────────
  - id: total
    visual: correctness
    head: { section: "§ 2", topic: "total correctness" }
    cite: "paper §2"
    quote: |
      A consensus protocol P is totally correct in spite of one
      fault if it is partially correct, and every admissible run is
      a deciding run.
    note:
      marker: "▸"
      body: |
        Total correctness adds the part that bites, termination.
        Every admissible run must actually decide even with one
        process down, meaning some process finally writes its y from
        b to a value. Theorem 1 says no protocol can hold all three
        at once, and termination is what gives. Agreement holds the
        whole way through. The decision is simply what never comes.

    chrome: { stage: null, valency: univalent-1, faulty: null }
    processes:
      - { id: p1, x: 0, y: 1, pos: [200, 180] }
      - { id: p2, x: 1, y: 1, pos: [600, 180] }
      - { id: p3, x: 0, y: 1, pos: [400, 500] }
    buffer:
      - { id: m1, from: p1, to: p2, payload: "vote 0" }
      - { id: m2, from: p1, to: p3, payload: "vote 0" }
      - { id: m3, from: p2, to: p1, payload: "vote 1" }
      - { id: m4, from: p2, to: p3, payload: "vote 1" }
    null_steps: []
    trace: []

  # ──────────────────────────────────────────────────────────────
  # SCENE 7 — valency, defined.
  # The proof's central concept. Badge stays on `bivalent`. Bespoke
  # `valency-tree` visual: V rendered as a reachability tree.
  # ──────────────────────────────────────────────────────────────
  - id: valency_def
    head: { section: "§ 3", topic: "valency" }
    cite: "paper §3"
    quote: |
      Let C be a configuration and let V be the set of decision
      values of configurations reachable from C. C is bivalent
      if |V| = 2. C is univalent if |V| = 1, let us say 0-valent
      or 1-valent according to the corresponding decision value.

    visual: valency-tree
    chrome: { stage: 7, valency: bivalent, faulty: p3 }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500], faulty: true }
    buffer:
      - { id: m2, from: p1, to: p3, payload: "vote 0" }
      - { id: m3, from: p2, to: p1, payload: "vote 1" }
      - { id: m4, from: p2, to: p3, payload: "vote 1" }
      - { id: m5, from: p1, to: p2, payload: "vote 0" }
      - { id: m6, from: p1, to: p3, payload: "vote 0" }
    null_steps: [p1, p2, p3]
    trace:
      - { stage: 3, verb: step,    target: "(p1, ∅)" }   # p1's retry → m5, m6
      - { stage: 4, verb: step,    target: "(p3, ∅)" }   # p3's last step — then faulty
      - { stage: 5, verb: deliver, target: "m1" }         # p2 (nonfaulty) receives p1's vote
      - { stage: 6, verb: delay,   target: "m3" }         # adversary defers m3
      - { stage: 7, verb: deliver, target: "m3" }         # p1 (nonfaulty) finally receives p2's vote

  # ──────────────────────────────────────────────────────────────
  # SCENE 8 — Robinson's translation. Not from the paper.
  # Same `valency-tree` visual as valency_def — a secondary-source
  # gloss on what bivalent means.
  # ──────────────────────────────────────────────────────────────
  - id: valency_intuition
    head: { section: "§ 3", topic: "bivalent = undecided yet" }
    cite: "Robinson, A Brief Tour of FLP Impossibility"
    quote: |
      read bivalent as "undecided yet"
    note:
      marker: "—"
      body: |
        a 0-valent config doesn't mean a process has DECIDED 0 —
        it means every admissible continuation will eventually
        decide 0. Univalent = future committed. Bivalent = the
        future is structurally open, even when every `y_p` is
        still blank.

    visual: valency-tree
    chrome: { stage: 7, valency: bivalent, faulty: p3 }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500], faulty: true }
    buffer:
      - { id: m2, from: p1, to: p3, payload: "vote 0" }
      - { id: m3, from: p2, to: p1, payload: "vote 1" }
      - { id: m4, from: p2, to: p3, payload: "vote 1" }
      - { id: m5, from: p1, to: p2, payload: "vote 0" }
      - { id: m6, from: p1, to: p3, payload: "vote 0" }
    null_steps: [p1, p2, p3]
    trace:
      - { stage: 3, verb: step,    target: "(p1, ∅)" }   # p1's retry → m5, m6
      - { stage: 4, verb: step,    target: "(p3, ∅)" }   # p3's last step — then faulty
      - { stage: 5, verb: deliver, target: "m1" }         # p2 (nonfaulty) receives p1's vote
      - { stage: 6, verb: delay,   target: "m3" }         # adversary defers m3
      - { stage: 7, verb: deliver, target: "m3" }         # p1 (nonfaulty) finally receives p2's vote

  # ──────────────────────────────────────────────────────────────
  # SCENE 9 — Lemma 2. A bivalent initial config exists.
  # Bespoke `lemma2-sxs` visual: two adjacent initials + identical σ
  # reaching the same decision → contradiction. The stage-0 snapshot
  # below still feeds the chrome bar.
  # ──────────────────────────────────────────────────────────────
  - id: lemma2
    head: { section: "§ 3", topic: "lemma 2 · bivalent initial" }
    cite: "paper §3"
    quote: |
      P has a bivalent initial configuration.
    note:
      marker: "▸"
      body: |
        proof by contradiction (paper §3): if every initial were
        univalent, pick adjacent 0-valent and 1-valent initials
        differing only in p's x_p, then crash p in a deciding run
        — both runs reach the same decision, contradicting the
        valency assignment. The proof uses exactly ONE crashed
        process — the very fault model the theorem allows.

    visual: lemma2-sxs
    chrome: { stage: 0, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    buffer: []
    null_steps: [p1, p2, p3]
    trace: []

  # ──────────────────────────────────────────────────────────────
  # SCENE — Lemma 1, commutativity.
  # Pedestrian but load-bearing: Lemma 3 Case 1 leans on it.
  # Same stage-0 setup so it doesn't disturb the lemma 3 hero.
  # ──────────────────────────────────────────────────────────────
  - id: lemma1_commutativity
    visual: lemma1-commute
    head: { section: "§ 2", topic: "lemma 1 · commutativity" }
    cite: "paper §2"
    quote: |
      Suppose that from some configuration C, the schedules σ₁,
      σ₂ lead to configurations C₁, C₂, respectively. If the sets
      of processes taking steps in σ₁ and σ₂, respectively, are
      disjoint, then σ₂ can be applied to C₁ and σ₁ can be
      applied to C₂, and both lead to the same configuration C₃.
    note:
      marker: "▸"
      body: |
        when two schedules touch disjoint sets of processes, they
        commute. Pedestrian on its own; load-bearing in Lemma 3.
        Case 1 of that proof needs exactly this — an event for p
        and an event for p' (p' ≠ p) can swap order without
        changing the resulting configuration.

    chrome: { stage: 0, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    buffer: []
    null_steps: [p1, p2, p3]
    trace: []

  # ──────────────────────────────────────────────────────────────
  # SCENE — Lemma 3. The hard one. The "preservation" lemma.
  # Bespoke `lemma3-set-D` visual: C → 𝒞 → apply e → 𝒟, with the
  # bivalent member of 𝒟 highlighted. The stage-12 snapshot below
  # still feeds the chrome bar.
  # ──────────────────────────────────────────────────────────────
  - id: lemma3
    head: { section: "§ 3", topic: "lemma 3 · preservation" }
    cite: "paper §3"
    quote: |
      Let C be a bivalent configuration of P, and let e = (p, m)
      be an event that is applicable to C. Let 𝒞 be the set of
      configurations reachable from C without applying e, and
      let 𝒟 = e(𝒞) = {e(E) | E ∈ 𝒞 and e is applicable to E}.
      Then, 𝒟 contains a bivalent configuration.
    note:
      marker: "— Aspnes:"
      body: |
        "if the adversary can keep the protocol in a bivalent
        configuration forever, it can prevent the processes from
        ever deciding."

    visual: lemma3-set-D
    chrome: { stage: 12, valency: bivalent, faulty: p3 }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500], faulty: true }
    # Stage-12 snapshot (dormant — lemma3-set-D uses a proof-anatomy rail, so
    # this buffer isn't rendered; kept in sync with `construction`). The opening
    # m2·m4·m6 are STILL stuck at faulty p3; m8 (to p1) and m9 (to p2) are the
    # live p1↔p2 churn. Both values in flight → bivalent.
    buffer:
      - { id: m2, from: p1, to: p3, payload: "vote 0" }
      - { id: m4, from: p2, to: p3, payload: "vote 1" }
      - { id: m6, from: p1, to: p3, payload: "vote 0" }
      - { id: m8, from: p2, to: p1, payload: "vote 1" }
      - { id: m9, from: p1, to: p2, payload: "vote 0" }
    null_steps: [p1, p2, p3]
    trace:
      - { stage: 8,  verb: deliver, target: "m5" }        # p2 receives p1's opening vote
      - { stage: 9,  verb: step,    target: "(p2, ∅)" }   # p2 re-broadcasts → m8 (to p1)
      - { stage: 10, verb: step,    target: "(p1, ∅)" }   # p1 re-broadcasts → m9 (to p2)
      - { stage: 11, verb: delay,   target: "m8" }        # adversary defers m8
      - { stage: 12, verb: deliver, target: "m8" }        # HEAD p1 receives its earliest — the stage rule

  # ──────────────────────────────────────────────────────────────
  # SCENE 11 — the main construction.
  # Bespoke `construction-q` visual: rotating process queue +
  # per-process earliest-first message queues + the head-takes-a-step
  # rule. The stage-12 snapshot below still feeds the chrome bar.
  # ──────────────────────────────────────────────────────────────
  - id: construction
    head: { section: "§ 3", topic: "the construction" }
    cite: "paper §3"
    quote: |
      Each stage consists of one or more process steps. The
      stage ends with the first process in the process queue
      taking a step in which, if its message queue was not empty
      at the start of the stage, its earliest message is
      received. This process is then moved to the back of the
      process queue.
    note:
      marker: "▸"
      body: |
        the queue + earliest-message rule is what makes the
        infinite run ADMISSIBLE — every nonfaulty process takes
        infinitely many steps, every message eventually gets
        delivered. The adversary's freedom is in WHICH stage
        each delivery lands.

    visual: construction-q
    chrome: { stage: 12, valency: bivalent, faulty: p3 }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500], faulty: true }
    # Same stage-12 snapshot as lemma3 (the per-recipient queues in the canvas
    # are this buffer, organized + earliest-first). m2·m4·m6 stuck at faulty p3;
    # m8 (to p1, p1's earliest — received this stage) and m9 (to p2) are live.
    buffer:
      - { id: m2, from: p1, to: p3, payload: "vote 0" }
      - { id: m4, from: p2, to: p3, payload: "vote 1" }
      - { id: m6, from: p1, to: p3, payload: "vote 0" }
      - { id: m8, from: p2, to: p1, payload: "vote 1" }
      - { id: m9, from: p1, to: p2, payload: "vote 0" }
    null_steps: [p1, p2, p3]
    trace:
      - { stage: 8,  verb: deliver, target: "m5" }        # p2 receives p1's opening vote
      - { stage: 9,  verb: step,    target: "(p2, ∅)" }   # p2 re-broadcasts → m8 (to p1)
      - { stage: 10, verb: step,    target: "(p1, ∅)" }   # p1 re-broadcasts → m9 (to p2)
      - { stage: 11, verb: delay,   target: "m8" }        # adversary defers m8
      - { stage: 12, verb: deliver, target: "m8" }        # HEAD p1 receives its earliest — the stage rule

  # ──────────────────────────────────────────────────────────────
  # SCENE 12 — the punchline. Stage 99. Still bivalent.
  # Trace is long; buffer never empties; nobody has decided. This
  # is the visual proof: the badge has not budged.
  # ──────────────────────────────────────────────────────────────
  - id: punchline
    head: { section: "§ 3", topic: "forever bivalent" }
    cite: "paper §3"
    quote: |
      Since each stage ends in a bivalent configuration, every
      stage in the construction of the infinite schedule
      succeeds. The resulting run is admissible, and no decision
      is ever reached. It follows that P is not totally correct.

    # SEND view: the pile that never drains — p1, p2 still broadcasting into the
    # pool (p3 dead/dark), the buffer never empties, valency still bivalent.
    visual: message-buffer
    chrome: { stage: 99, valency: bivalent, faulty: p3 }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500], faulty: true }
    # Buffer is m84 + m87 (the two delays in the trace below) plus
    # m96 (the newly-sent message from stage 96's ∅ step).
    buffer:
      - { id: m84, from: p2, to: p1, payload: "vote 1" }
      - { id: m87, from: p1, to: p2, payload: "vote 0" }
      - { id: m96, from: p2, to: p3, payload: "vote 1" }
    null_steps: [p1, p2, p3]
    trace:
      - { stage: 93, verb: deliver, target: "m83" }
      - { stage: 94, verb: delay,   target: "m84" }       # held — still pending
      - { stage: 95, verb: deliver, target: "m85" }
      - { stage: 96, verb: deliver, target: "m86" }
      - { stage: 97, verb: delay,   target: "m87" }       # held — still pending
      - { stage: 98, verb: deliver, target: "m88" }
      - { stage: 99, verb: step,    target: "(p2, ∅)" }   # p2 broadcasts again → m96 (the pile never stops)

  # ──────────────────────────────────────────────────────────────
  # SCENE — window of vulnerability. The "so what" moment.
  # Reuses the stage-99 punchline canvas — same picture, sharper
  # framing. FLP isn't a bug in any one protocol; it's the
  # structural fact behind the folklore.
  # ──────────────────────────────────────────────────────────────
  - id: window_of_vulnerability
    head: { section: "§ 1", topic: "the folklore, vindicated" }
    cite: "paper §1"
    quote: |
      The asynchronous commit protocols in current use all seem
      to have a "window of vulnerability" — an interval of time
      during the execution of the algorithm in which the delay
      or inaccessibility of a single process can cause the
      entire algorithm to wait indefinitely. It follows from
      our impossibility result that every commit protocol has
      such a "window," confirming a widely believed tenet in
      the folklore.
    note:
      marker: "▸"
      body: |
        this is what the proof is FOR. Practitioners had long
        suspected commit protocols were fragile to timing; FLP
        showed it's a structural property of the problem, not a
        bug in any one protocol. Every asynchronous commit
        protocol — Paxos, Raft, two-phase commit — has a window.

    visual: message-buffer
    chrome: { stage: 99, valency: bivalent, faulty: p3 }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500], faulty: true }
    buffer:
      - { id: m84, from: p2, to: p1, payload: "vote 1" }
      - { id: m87, from: p1, to: p2, payload: "vote 0" }
      - { id: m96, from: p2, to: p3, payload: "vote 1" }
    null_steps: [p1, p2, p3]
    trace:
      - { stage: 93, verb: deliver, target: "m83" }
      - { stage: 94, verb: delay,   target: "m84" }
      - { stage: 95, verb: deliver, target: "m85" }
      - { stage: 96, verb: deliver, target: "m86" }
      - { stage: 97, verb: delay,   target: "m87" }
      - { stage: 98, verb: deliver, target: "m88" }
      - { stage: 99, verb: step,    target: "(p2, ∅)" }

  # ──────────────────────────────────────────────────────────────
  # SCENE — §4 positive result. The contrast.
  # Same authors, same paper: consensus IS possible if no process
  # crashes DURING the run (initially-dead-only fault model).
  # The "during execution" weakening is exactly the FLP-blocking
  # weakness — restore "initially dead only" and consensus is
  # back. Needs a dedicated canvas treatment (TODO sketch).
  # ──────────────────────────────────────────────────────────────
  - id: section_4_positive_result
    head: { section: "§ 4", topic: "consensus IS possible if…" }
    cite: "paper §4"
    quote: |
      There is a partially correct consensus protocol in which
      all nonfaulty processes always reach a decision, provided
      no processes die during its execution and a strict majority
      of the processes are alive initially.
    note:
      marker: "▸"
      body: |
        the same authors, in the same paper. Weaken the fault
        model by exactly one knob — say "no NEW crashes after
        the protocol begins" — and consensus is achievable. FLP
        is sharp: it picks out the precise hostile fault model
        and shows that's the cliff. Slightly less hostile and
        you're back on solid ground.

    # Outside the impossibility run (different fault model, no buffer). Neutral
    # bare-processes stopgap until the bespoke §4 visual (initial-clique digraph
    # + proof-anatomy rail — see plan.md); NOT the impossibility buffer.
    visual: system
    chrome: { stage: 0, valency: bivalent, faulty: null }
    processes:
      - { id: p1, x: 0, y: b, pos: [200, 180] }
      - { id: p2, x: 1, y: b, pos: [600, 180] }
      - { id: p3, x: 0, y: b, pos: [400, 500] }
    buffer: []
    null_steps: [p1, p2, p3]
    trace: []
    # NOTE: this scene currently falls back to the default canvas.
    # A bespoke §4-protocol sketch (initial-clique digraph) would
    # land better — see plan.md's optional sketch list.

